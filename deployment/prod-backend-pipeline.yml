AWSTemplateFormatVersion: '2010-09-09'
Description: Far Too Young - Production Backend Pipeline (V2 with CodeStar)

Parameters:
  ConnectionArn:
    Type: String
    Default: arn:aws:codeconnections:us-east-1:538781441544:connection/2b096c20-2f8f-4def-8be1-030bbc00df07
  RepositoryName:
    Type: String
    Default: asharma12git/fartooyoung
  BranchName:
    Type: String
    Default: main

Resources:
  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: fartooyoung-production-backend-pipeline-artifacts
      LifecycleConfiguration:
        Rules:
          - Id: CleanupOldArtifacts
            Status: Enabled
            ExpirationInDays: 7

  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BackendBuildPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:GetBucketVersioning
                  - s3:ListBucket
                Resource:
                  - arn:aws:s3:::fartooyoung-backend-production
                  - arn:aws:s3:::fartooyoung-backend-production/*
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub ${ArtifactBucket.Arn}/*
              - Effect: Allow
                Action:
                  - cloudformation:*
                Resource:
                  - arn:aws:cloudformation:us-east-1:538781441544:stack/fartooyoung-production/*
              - Effect: Allow
                Action:
                  - cloudformation:GetTemplateSummary
                Resource: '*'
              - Effect: Allow
                Action:
                  - lambda:*
                Resource:
                  - arn:aws:lambda:us-east-1:538781441544:function:fartooyoung-production-*
              - Effect: Allow
                Action:
                  - iam:GetRole
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PassRole
                  - iam:TagRole
                Resource:
                  - arn:aws:iam::538781441544:role/fartooyoung-production-*
              - Effect: Allow
                Action:
                  - apigateway:*
                Resource:
                  - arn:aws:apigateway:us-east-1::*
              - Effect: Allow
                Action:
                  - dynamodb:DescribeTable
                  - dynamodb:CreateTable
                  - dynamodb:UpdateTable
                Resource:
                  - arn:aws:dynamodb:us-east-1:538781441544:table/fartooyoung-production-*
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
              - Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DescribeStackEvents
                Resource: '*'

  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: fartooyoung-production-backend-build
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
      Source:
        Type: CODEPIPELINE
        BuildSpec: |
          version: 0.2
          phases:
            install:
              runtime-versions:
                nodejs: 18
                python: 3.11
              commands:
                - pip3 install aws-sam-cli
            build:
              commands:
                - cd backend
                - sam build
                - sam deploy --config-env production --no-confirm-changeset --no-fail-on-empty-changeset

  PipelineRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                  - codeconnections:UseConnection
                Resource: !Ref ConnectionArn
              - Effect: Allow
                Action:
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                Resource: !GetAtt CodeBuildProject.Arn
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:GetBucketVersioning
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub ${ArtifactBucket.Arn}/*

  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: fartooyoung-production-backend-pipeline
      PipelineType: V2
      RoleArn: !GetAtt PipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      Triggers:
        - ProviderType: CodeStarSourceConnection
          GitConfiguration:
            SourceActionName: Source
            Push:
              - FilePaths:
                  Includes:
                    - "backend/lambda/**"
                    - "backend/template.yaml"
                    - "backend/samconfig.toml"
                    - "backend/package.json"
                    - "backend/package-lock.json"
                  Excludes:
                    - "backend/scripts/**"
                    - "backend/README.md"
                Branches:
                  Includes:
                    - main
      Stages:
        - Name: Source
          Actions:
            - Name: Source
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: '1'
              Configuration:
                ConnectionArn: !Ref ConnectionArn
                FullRepositoryId: !Ref RepositoryName
                BranchName: !Ref BranchName
                DetectChanges: false
              OutputArtifacts:
                - Name: SourceOutput
        - Name: Build
          Actions:
            - Name: BuildBackend
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref CodeBuildProject
              InputArtifacts:
                - Name: SourceOutput

Outputs:
  PipelineName:
    Value: !Ref Pipeline
  PipelineUrl:
    Value: !Sub https://us-east-1.console.aws.amazon.com/codesuite/codepipeline/pipelines/${Pipeline}/view
